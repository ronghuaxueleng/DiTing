name: Build & Release

on:
  push:
    tags:
      - "v*"  # Trigger on version tags (e.g., v0.13.0)

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (no dev)
        run: uv sync --no-dev

      - name: Build sidecar executable
        run: uv run python scripts/build_sidecar.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: diting-exe
          path: src-tauri/binaries/diting-server-*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: diting-exe
          path: ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DiTing ${{ github.ref_name }}
          body: |
            自动生成的二进制文件（Windows）
            版本已同步到 `pyproject.toml` 中的 `v${{ github.ref_name }}`。
          files: ./dist/diting-server-*.exe